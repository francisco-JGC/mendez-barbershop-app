name: mendez_pos
description: "Mendez Barbershop - POS app for sellers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Functional error handling
  fpdart: ^1.1.1

  # DI
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Serialization / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.5.3

  # Locale / formatting
  intl: ^0.20.2

  # Bluetooth thermal printing
  print_bluetooth_thermal: ^1.2.2
  esc_pos_utils_plus: ^2.0.4
  permission_handler: ^12.0.3
  image: ^4.5.4

  # UI helpers
  gap: ^3.0.1

  # Env config
  flutter_dotenv: ^5.2.1

  # Camera-based barcode scanning
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
  injectable_generator: ^2.6.2

  # Testing
  mocktail: ^1.0.4

  # Launcher icon generation for Android & iOS
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): white background + the logo scaled so the
  # circular/squircle mask never crops the letters.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
